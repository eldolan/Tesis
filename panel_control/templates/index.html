<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</head>
<header>
    <button id="abrir-menu" onclick="abrirSidebar()" aria-label="Abrir Menú" aria-expanded="false" aria-controls="navbar">
        <img src="{{ url_for('static', filename='images/menu.svg') }}" alt="Abrir menú">
    </button>
        <nav id="navbar">
            <ul>
                <li id="espaciado-cerrar">
                    <button id="cerrar-menu" onclick="cerrarSidebar()" aria-label="Cerrar Menú"><image src="{{ url_for('static', filename='images/close.svg') }}" alt="Cerrar Menu"></image>
                    </button>
                </li>
                <li id="logo-inicio">
                    <a href="#" class="logo" >
                        <img title="Inicio" src="{{ url_for('static', filename='images/logo.svg') }}" alt="Logo">
                    </a>
                </li>
                <li><a href="#" class="nav-text">Inicio</a></li>
                <li><a href="#" class="nav-text">Riego</a></li>
                <li><a href="#" class="nav-text">Fertilizante</a></li>
                <li><a href="#" class="nav-text">Contacto</a></li>
                <li id="espaciado-campana">
                    <a href="#" id="logo-campana" class="logo">
                        <img title="Notificaciones"= src="{{ url_for('static', filename='images/bell.svg') }}" alt="Notificaciones">
                    </a>
                </li>
                <li>
                    <a href="#" id="logo-usuario" class="logo">
                        <img title="Usuario" src="{{ url_for('static', filename='images/user.svg') }}" alt="Usuario">
                    </a>
                </li>
            </ul>
        </nav>
    <div id="overlay" onclick="closeSidebar()" aria-hidden="true"></div>
</header>
<main>
    <body>
        <div class="body">
        </div>
    </body>
</main>
</html>
